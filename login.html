<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" type="text/CSS" href="css/login.css">
</head>
<body>
    <div class="container">
        <h3>Regístrate en YEMM</h3>
        <div class="buttons">
            <button class="google-btn">
                <picture>
                    <img src="https://entredichos.trabajosocial.unlp.edu.ar/wp-content/uploads/sites/6/2016/12/Google_-G-_Logo.svg_.png" alt="Google_-G-_Logo">
                </picture>
                <span>Regístrate con Google</span>
            </button>
            <button class="twitter-btn">
                <picture>
                    <svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="anx9at8qd5owgd3th4qyajh097x0b6cz" role="img" viewBox="0 0 24 24" class="icon "><title id="anx9at8qd5owgd3th4qyajh097x0b6cz">Twitter icon</title><path d="M23.954 4.569c-.885.389-1.83.654-2.825.775 1.014-.611 1.794-1.574 2.163-2.723-.951.555-2.005.959-3.127 1.184-.896-.959-2.173-1.559-3.591-1.559-2.717 0-4.92 2.203-4.92 4.917 0 .39.045.765.127 1.124C7.691 8.094 4.066 6.13 1.64 3.161c-.427.722-.666 1.561-.666 2.475 0 1.71.87 3.213 2.188 4.096-.807-.026-1.566-.248-2.228-.616v.061c0 2.385 1.693 4.374 3.946 4.827-.413.111-.849.171-1.296.171-.314 0-.615-.03-.916-.086.631 1.953 2.445 3.377 4.604 3.417-1.68 1.319-3.809 2.105-6.102 2.105-.39 0-.779-.023-1.17-.067 2.189 1.394 4.768 2.209 7.557 2.209 9.054 0 13.999-7.496 13.999-13.986 0-.209 0-.42-.015-.63.961-.689 1.8-1.56 2.46-2.548l-.047-.02z"></path></svg>
            </button>
        </div>
        <div class="separator">
            <hr>
            <span>O...</span>
            <hr>
        </div>
        <form action="" method="">
            <div class="section-inputs">
                <label for="name" class="label-input">
                    <span>Name</span>
                    <input type="text" required id="name" name="name">
                </label>
                <label for="username" class="label-input">
                    <span>Username</span>
                    <input type="text" id="username" required name="username">
                </label>
            </div>
            <label for="email" class="label-input">
                <span>Email</span>
                <input type="email" id="email" required name="email">
            </label>
            <label for="password" class="label-input">
                <span>Password</span>
                <input type="password" required placeholder="6+ caracteres" id="password" name="password">
            </label>
            <label for="checkbox" class="checkbox-label">
                <input type="checkbox" required id="checkbox">
                <span>Acepto los terminos y condiciones</span>
            </label>
            <button type="submit" class="submit-btn">Crear Cuenta</button>
        </form>
    </div>
</body>
</html>
